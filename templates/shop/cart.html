{% extends 'base.html' %}
{% block content %}
<h2>Carrito</h2>
<ul>
{% for item in cart.items.all %}
  <li>{{item.product.name}} x {{item.quantity}} - Bs {{item.product.price_bob}}</li>
{% empty %}<li>Vacío</li>{% endfor %}
</ul>
<p>Total: Bs {{cart.total_bob}}</p>
<a href="/checkout/">Ir al checkout</a>
{% endblock %}
